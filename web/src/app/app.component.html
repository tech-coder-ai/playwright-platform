<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">PT</span>
      <div>
        <strong>Playwright</strong>
        <span>Testing Platform</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Dashboard
      </a>
      <a routerLink="/projects" routerLinkActive="active">Projects</a>
      <a routerLink="/unit-test-prompts" routerLinkActive="active">Unit test prompts</a>
      @if (auth.authEnabled() && auth.hasMinRole('admin')) {
        <a routerLink="/users" routerLinkActive="active">Users</a>
      }
    </nav>
  </aside>

  <div class="shell-body">
    <header class="topbar">
      <div class="topbar-actions">
        <button
          class="theme-toggle"
          type="button"
          (click)="theme.cycle()"
          [attr.aria-label]="'Theme: ' + theme.mode() + ' — click to change'"
          [title]="'Theme: ' + theme.mode()"
        >
          @switch (theme.mode()) {
            @case ('light') {
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4" />
              </svg>
            }
            @case ('dark') {
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
              </svg>
            }
            @default {
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="13" rx="2" />
                <path d="M8 21h8m-4-4v4" />
              </svg>
            }
          }
          <span class="theme-label">{{ theme.mode() }}</span>
        </button>

        @if (auth.authEnabled()) {
          <div class="user-menu">
            @if (auth.currentUser(); as user) {
              <span class="user-email">{{ user.email }}</span>
              <span class="role-badge">{{ user.role }}</span>
              <button class="btn btn-link" type="button" (click)="auth.logout()">Sign out</button>
            } @else {
              <a routerLink="/login" class="btn btn-secondary">Sign in</a>
            }
          </div>
        }
      </div>
    </header>

    <main class="app-main">
      <router-outlet />
    </main>
  </div>
</div>
